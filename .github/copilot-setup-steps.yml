# Setup steps for Copilot cloud agent environment
# Installs tools needed to scaffold, validate, and deploy Radius applications.

steps:
  - name: Install Radius CLI
    run: |
      curl -fsSL "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" | /bin/bash

  - name: Install Bicep CLI
    run: rad bicep download

  - name: Clone resource-types-contrib
    run: |
      git clone https://github.com/radius-project/resource-types-contrib.git /tmp/resource-types-contrib

  - name: Clone containerImages resource type
    run: |
      git clone https://github.com/willdavsmith/radius-containerimagetype-demo.git /tmp/radius-containerimagetype-demo

  - name: Verify tools
    run: |
      rad version
      rad bicep version
